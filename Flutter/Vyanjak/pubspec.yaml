name: vyanjak
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts:
  cupertino_icons:
  http:
  record:
  path_provider:
  permission_handler:
  flutter_tts:
  sensors_plus:
  pdf:
  shared_preferences:
  speech_to_text:
  printing:
  google_sign_in: 6.2.1
  cloud_firestore:
  firebase_auth:
  firebase_core:
  image_picker:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: false
  image_path: "assets/vyanjak logo.jpeg"
  adaptive_icon_background: "#F4FAF6"
  adaptive_icon_foreground: "assets/vyanjak logo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/